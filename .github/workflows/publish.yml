name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

jobs:
  test:
    name: Test before publish
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          pip install pytest-timeout

      - name: Run tests
        run: pytest --cov=anjor --cov-fail-under=95 -vv --capture=no --timeout=60

      - name: ruff check
        run: ruff check anjor/ tests/

      - name: mypy
        run: mypy anjor/

  publish:
    name: Build and publish
    runs-on: ubuntu-latest
    needs: test
    environment: pypi
    permissions:
      contents: read
      id-token: write  # required for trusted publishing

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install build tools
        run: pip install build

      - name: Build
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
