<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anjor — Trace Detail</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="utils.js"></script>
</head>
<body class="min-h-screen bg-gray-950 text-gray-100 font-mono">
  <div id="nav"></div>
  <main class="px-6 py-8 max-w-7xl mx-auto space-y-8" id="app">
    <p class="text-gray-600 text-sm">Loading…</p>
  </main>
  <script>
    document.getElementById('nav').innerHTML = buildNav('/ui/llm.html')

    const traceId = new URLSearchParams(window.location.search).get('id') || ''
    let lastUpdated = ''

    async function load() {
      try {
        const turns = await fetch(`${API}/llm/${encodeURIComponent(traceId)}`).then(r => r.json())
        lastUpdated = new Date().toLocaleTimeString()
        render(turns)
      } catch {
        document.getElementById('app').innerHTML = errorBanner('Trace not found or collector unreachable.')
      }
    }

    function contextGrowthChart(turns) {
      const data = turns.filter(t => t.context_window_used != null && t.context_window_limit != null)
      if (data.length < 2) return '<p class="text-gray-600 text-sm">Need 2+ turns to render chart.</p>'

      const W = 600, H = 180
      const PAD = { top: 16, right: 56, bottom: 28, left: 52 }
      const innerW = W - PAD.left - PAD.right
      const innerH = H - PAD.top - PAD.bottom
      const limit = data[0].context_window_limit || 1
      const xStep = innerW / (data.length - 1)
      const yFor = used => PAD.top + innerH - (used / limit) * innerH

      const points = data.map((d, i) => ({
        x: PAD.left + i * xStep,
        y: yFor(d.context_window_used || 0),
        turn: i + 1,
      }))

      const linePath = points.map((p, i) => `${i === 0 ? 'M' : 'L'}${p.x},${p.y}`).join(' ')
      const thresh70y = yFor(limit * 0.7)
      const thresh90y = yFor(limit * 0.9)

      const gridLines = [0, 0.25, 0.5, 0.75, 1.0].map(pct => {
        const y = yFor(limit * pct)
        return `<line x1="${PAD.left}" y1="${y}" x2="${W - PAD.right}" y2="${y}" stroke="#1f2937" stroke-width="1"/>
                <text x="${PAD.left - 4}" y="${y + 4}" text-anchor="end" fill="#6b7280" font-size="9">${(pct * 100).toFixed(0)}%</text>`
      }).join('')

      const dots = points.map(p =>
        `<circle cx="${p.x}" cy="${p.y}" r="3.5" fill="#60a5fa"/>
         <text x="${p.x}" y="${H - 8}" text-anchor="middle" fill="#6b7280" font-size="9">${p.turn}</text>`
      ).join('')

      return `<svg viewBox="0 0 ${W} ${H}" class="w-full h-44 text-xs">
        ${gridLines}
        <line x1="${PAD.left}" y1="${thresh70y}" x2="${W - PAD.right}" y2="${thresh70y}"
          stroke="#fbbf24" stroke-dasharray="4 3" stroke-width="1"/>
        <text x="${W - PAD.right + 4}" y="${thresh70y + 4}" fill="#fbbf24" font-size="9">70%</text>
        <line x1="${PAD.left}" y1="${thresh90y}" x2="${W - PAD.right}" y2="${thresh90y}"
          stroke="#f87171" stroke-dasharray="4 3" stroke-width="1"/>
        <text x="${W - PAD.right + 4}" y="${thresh90y + 4}" fill="#f87171" font-size="9">90%</text>
        <path d="${linePath}" fill="none" stroke="#60a5fa" stroke-width="2" stroke-linejoin="round"/>
        ${dots}
        <text x="${PAD.left + innerW / 2}" y="${H - 2}" text-anchor="middle" fill="#4b5563" font-size="9">Turn</text>
      </svg>`
    }

    function render(turns) {
      if (turns.length === 0) {
        document.getElementById('app').innerHTML = `
          <div class="flex items-start justify-between">
            <div>
              <h1 class="text-xl font-bold text-white">Trace Detail</h1>
              <code class="text-xs text-gray-500 font-mono">${traceId}</code>
            </div>
          </div>
          <p class="text-gray-600 text-sm">No LLM calls found for this trace ID.</p>`
        return
      }

      const totalIn = turns.reduce((s, t) => s + (t.token_input || 0), 0)
      const totalOut = turns.reduce((s, t) => s + (t.token_output || 0), 0)
      const maxUtil = turns.reduce((m, t) => Math.max(m, t.context_utilisation || 0), 0)
      const growthRates = turns.slice(1).map((t, i) =>
        (t.context_window_used || 0) - (turns[i].context_window_used || 0))
      const avgGrowth = growthRates.length
        ? growthRates.reduce((s, v) => s + v, 0) / growthRates.length : 0

      const cards = [
        { label: 'Turns', value: turns.length.toString() },
        { label: 'Total Tokens In', value: totalIn.toLocaleString() },
        { label: 'Total Tokens Out', value: totalOut.toLocaleString() },
        { label: 'Peak Context Util.', value: fmt.pct(maxUtil), warn: maxUtil > 0.9, caution: maxUtil > 0.7 },
      ].map(({ label, value, warn, caution }) => `
        <div class="bg-gray-900 border border-gray-800 rounded-lg p-4">
          <p class="text-xs text-gray-500 uppercase tracking-wider mb-1">${label}</p>
          <p class="text-xl font-bold ${warn ? 'text-red-400' : caution ? 'text-yellow-400' : 'text-white'}">${value}</p>
        </div>`).join('')

      const tableRows = turns.map((t, i) => `
        <tr class="border-b border-gray-900 hover:bg-gray-900/50">
          <td class="py-2 pr-4 text-gray-600 text-xs">${i + 1}</td>
          <td class="py-2 pr-4 text-gray-400 font-mono text-xs truncate max-w-xs">${t.model}</td>
          <td class="py-2 pr-4 text-right text-gray-300">${fmt.ms(t.latency_ms)}</td>
          <td class="py-2 pr-4 text-right text-gray-300">${fmt.tokens(t.token_input)}</td>
          <td class="py-2 pr-4 text-right text-gray-300">${fmt.tokens(t.token_output)}</td>
          <td class="py-2 pr-4 text-right text-gray-300">${fmt.tokens(t.context_window_used)}</td>
          <td class="py-2 pr-4 text-right ${utilColor(t.context_utilisation || 0)}">${fmt.utilPct(t.context_utilisation)}</td>
          <td class="py-2 pr-4 text-right text-gray-500 text-xs">${t.finish_reason || '—'}</td>
          <td class="py-2 text-right text-gray-600 text-xs">${fmt.ts(t.timestamp)}</td>
        </tr>`).join('')

      document.getElementById('app').innerHTML = `
        <div class="flex items-start justify-between">
          <div>
            <h1 class="text-xl font-bold text-white">Trace Detail</h1>
            <code class="text-xs text-gray-500 font-mono">${traceId}</code>
          </div>
          ${lastUpdatedBadge(lastUpdated)}
        </div>
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">${cards}</div>
        <section class="bg-gray-900 border border-gray-800 rounded-lg p-5">
          <div class="flex items-center justify-between mb-4">
            <h2 class="text-sm font-semibold text-gray-300 uppercase tracking-wider">Context Window Growth</h2>
            ${avgGrowth > 0 ? `<span class="text-xs text-gray-500">avg +${avgGrowth.toFixed(0)} tokens/turn</span>` : ''}
          </div>
          ${contextGrowthChart(turns)}
        </section>
        <section>
          <h2 class="text-sm font-semibold text-gray-300 uppercase tracking-wider mb-3">Turn-by-Turn</h2>
          <table class="w-full text-sm">
            <thead><tr class="border-b border-gray-800">
              <th class="text-left text-xs text-gray-500 uppercase pb-3 pr-4">#</th>
              <th class="text-left text-xs text-gray-500 uppercase pb-3 pr-4">Model</th>
              <th class="text-right text-xs text-gray-500 uppercase pb-3 pr-4">Latency</th>
              <th class="text-right text-xs text-gray-500 uppercase pb-3 pr-4">Tokens In</th>
              <th class="text-right text-xs text-gray-500 uppercase pb-3 pr-4">Tokens Out</th>
              <th class="text-right text-xs text-gray-500 uppercase pb-3 pr-4">Context Used</th>
              <th class="text-right text-xs text-gray-500 uppercase pb-3 pr-4">Context Util.</th>
              <th class="text-right text-xs text-gray-500 uppercase pb-3 pr-4">Finish</th>
              <th class="text-right text-xs text-gray-500 uppercase pb-3">Time</th>
            </tr></thead>
            <tbody>${tableRows}</tbody>
          </table>
        </section>`
    }

    load()
    setInterval(load, 5000)
  </script>
</body>
</html>
